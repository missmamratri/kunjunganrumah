<!DOCTYPE html>
<html>
<head>
  <title>Form Input Data</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 30px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    h2 { margin-top: 0; }
    label { font-weight: bold; }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #2e86de;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #1b4f72;
    }
    .item-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .item-row input {
      flex: 1;
    }
    .add-btn {
      background: #27ae60;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<h2>Form Input Data</h2>

<form id="dataForm">

  <div class="card">
    <label>Pilih Sheet:</label><br>
    <select name="sheetName" id="sheetSelect" required>
      <option value="">Memuat sheet...</option>
    </select>
    <br><br>

    <label>Tanggal Kunjungan Rumah :</label>
    <input type="date" name="tanggal" required>
    
    <label>Nama Kepala Keluarga :</label>
    <input type="text" name="kk" required>

    <label>NIK :</label>
    <input type="text" name="nik" required>

    <label>Alamat (minimal RT/RW) :</label>
    <textarea name="alamt" required></textarea>
  </div>

  <div class="card">
    <h3>Kondisi Umum</h3>

    <label>Memiliki Jamban Sehat :</label>
    <select name="jamban" required>
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

    <label>Ventilasi cukup (5-10% dari luas ruangan) :</label>
    <select name="ventilasi" required>
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

<label>Ada yg gangguan jiwa :</label>
    <select name="gjiwa" required>
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

    <label>Ada yang TBC:</label>
    <select name="tbc" required>
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

<label>Ada yg Hipertensi :</label>
    <select name="hipertensi" required>
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

<label>Ada yg Diabetes Mellitus :</label>
    <select name="diabetes" required>
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

  </div>

<div class="card">
    <h3>Ibu Hamil (kosongi bila tidak ada bumil)</h3>

    <label>Nama :</label>
    <select name="nama_bumil">
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

    <label>Usia Kehamilan :</label>
    <select name="usia_hamil">
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

<label>LILA :</label>
    <input type="text" name="lila">

<label>Punya Buku KIA :</label>
    <select name="buku_kia">
      <option value="">-- Pilih --</option>
      <option value="Ada">Ada</option>
      <option value="Tidak">Tidak</option>
    </select>

    <label>Minum TTD 24 jam terakhir :</label>
    <select name="ttd">
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

<label>Ada tanda bahaya? :</label>
    <select name="tandabahaya">
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>
  </div>

<div class="card">
    <h3>Ibu Bersalin dan Nifas (kosongi bila tidak ada bufas)</h3>

    <label>Nama :</label>
    <select name="nama_bumil">
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

    <label>Usia Kehamilan :</label>
    <select name="usia_hamil">
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

<label>LILA :</label>
    <input type="text" name="lila">

<label>Punya Buku KIA :</label>
    <select name="buku_kia">
      <option value="">-- Pilih --</option>
      <option value="Ada">Ada</option>
      <option value="Tidak">Tidak</option>
    </select>

    <label>Minum TTD 24 jam terakhir :</label>
    <select name="ttd">
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>

<label>Ada tanda bahaya? :</label>
    <select name="tandabahaya">
      <option value="">-- Pilih --</option>
      <option value="Ya">Ya</option>
      <option value="Tidak">Tidak</option>
    </select>
  </div>

  <div class="card">
    <h3>Barang yang Dibutuhkan</h3>
    <div id="itemsContainer"></div>
    <button type="button" class="add-btn" onclick="addItem()">+ Tambah Barang</button>
  </div>

  <button type="submit">Kirim</button>
</form>

<p id="response"></p>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbzOoUEF9Qs-EmO1K1fJgIAkEI9t1WVMs3dyAWzEOBLPONrVNw8zQHudoI1D4hYidC8i/exec?action=getSheets';
const form = document.getElementById('dataForm');
const responseMsg = document.getElementById('response');
const itemsContainer = document.getElementById('itemsContainer');

function addItem() {
  const div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML = `
    <input type="text" name="barang[]" placeholder="Nama Barang (contoh: Pulpen)">
    <input type="number" name="jumlah[]" placeholder="Jumlah">
    <input type="text" name="keterangan[]" placeholder="Keterangan (contoh: Tinta Merah)">
  `;
  itemsContainer.appendChild(div);
}

addItem(); // default 1 baris

form.addEventListener('submit', e => {
  e.preventDefault();
  responseMsg.innerHTML = "Mengirim...";

  fetch(scriptURL, {
  method: 'POST',
  body: new FormData(form)
})
.then(res => res.text())
.then(data => {
  responseMsg.innerHTML = data;
  // Reset semua input
  form.reset();

  // Hapus semua baris barang
  itemsContainer.innerHTML = "";

  // Tambahkan kembali 1 baris kosong
  addItem();
})
.catch(err => {
  responseMsg.innerHTML = "ERROR: " + err;
  console.error(err);
});
});

  const sheetSelect = document.getElementById("sheetSelect");

fetch(scriptURL + "?action=getSheets")
  .then(res => res.json())
  .then(data => {

    sheetSelect.innerHTML = '<option value="">-- Pilih Sheet --</option>';

    data.forEach(name => {
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      sheetSelect.appendChild(option);
    });

  })
  .catch(err => {
    sheetSelect.innerHTML = '<option value="">Gagal memuat sheet</option>';
    console.error(err);
  });
</script>

</body>
</html>
