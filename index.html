<!DOCTYPE html>
<html>
<head>
  <title>Form Rekapitulasi Kunjungan Rumah</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f9; padding:30px; }
    .card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    input, select, textarea { width:100%; padding:8px; margin:5px 0 15px; border-radius:6px; border:1px solid #ccc; }
    button { background:#2e86de; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer; }
    button:hover { background:#1b4f72; }
    .item-row { display:flex; gap:10px; margin-bottom:10px; }
    .item-row input { flex:1; }
    .add-btn { background:#27ae60; }
  </style>
</head>
<body>

<h2>Form Input Data</h2>

<form id="dataForm"
  action="https://script.google.com/macros/s/AKfycbwrMpyBKZaxOy0QVPAKZwLvMUeANqB8E6Th4-88WtSHIIp7qHzjqdHG9l0drzcsX8o/exec"
  method="POST"
  target="hidden_iframe">

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <div class="card">
    <label>Pilih Sheet:</label>
    <select name="sheetName" id="sheetSelect" required>
      <option value="">Memuat sheet...</option>
    </select>

    <label>Tanggal:</label>
    <input type="date" name="tanggal" required>

    <label>Nama KK:</label>
    <input type="text" name="kk" required>

    <label>NIK:</label>
    <input type="text" name="nik" required>

    <label>Alamat:</label>
    <textarea name="alamt" required></textarea>
  </div>

  <div class="card">
    <h3>Kondisi Umum</h3>

    <label>Jamban:</label>
    <select name="jamban" required>
      <option value="">-- Pilih --</option>
      <option>Ya</option>
      <option>Tidak</option>
    </select>

    <label>Ventilasi:</label>
    <select name="ventilasi" required>
      <option value="">-- Pilih --</option>
      <option>Ya</option>
      <option>Tidak</option>
    </select>

    <label>Gangguan Jiwa:</label>
    <select name="gjiwa" required>
      <option value="">-- Pilih --</option>
      <option>Ya</option>
      <option>Tidak</option>
    </select>

    <label>TBC:</label>
    <select name="tbc" required>
      <option value="">-- Pilih --</option>
      <option>Ya</option>
      <option>Tidak</option>
    </select>

    <label>Hipertensi:</label>
    <select name="hipertensi" required>
      <option value="">-- Pilih --</option>
      <option>Ya</option>
      <option>Tidak</option>
    </select>

    <label>Diabetes:</label>
    <select name="diabetes" required>
      <option value="">-- Pilih --</option>
      <option>Ya</option>
      <option>Tidak</option>
    </select>
  </div>

  <div class="card">
    <h3>Anggota Keluarga</h3>
    <div id="anggotaContainer"></div>
    <button type="button" class="add-btn" onclick="addAnggota()">+ Tambah Baris</button>
  </div>

  <button type="submit">Kirim</button>
</form>

<p id="response"></p>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwrMpyBKZaxOy0QVPAKZwLvMUeANqB8E6Th4-88WtSHIIp7qHzjqdHG9l0drzcsX8o/exec";
const form = document.getElementById("dataForm");
const responseMsg = document.getElementById("response");
const anggotaContainer = document.getElementById("anggotaContainer");

function addAnggota() {
  const div = document.createElement("div");
  div.className = "item-row";
  div.innerHTML = `
    <input type="text" name="bayi[]" placeholder="Bayi">
    <input type="text" name="pra[]" placeholder="Balita">
    <input type="text" name="remaja[]" placeholder="Remaja">
    <input type="text" name="produktif[]" placeholder="Produktif">
    <input type="text" name="lansia[]" placeholder="Lansia">
  `;
  anggotaContainer.appendChild(div);
}

addAnggota();

// ===== SUBMIT HANDLER =====
form.addEventListener("submit", function() {
  responseMsg.innerText = "Mengirim...";
});

document.querySelector("iframe").addEventListener("load", function() {
  responseMsg.innerText = "Data berhasil dikirim!";
  form.reset();
  anggotaContainer.innerHTML = "";
  addAnggota();
});

// ===== LOAD SHEETS =====
function loadSheets(data) {
  const select = document.getElementById("sheetSelect");
  select.innerHTML = "<option value=''>-- Pilih Sheet --</option>";

  data.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
}

function requestSheets() {
  const script = document.createElement("script");
  script.src = scriptURL + "?action=getSheets&callback=loadSheets";
  document.body.appendChild(script);
}

window.onload = requestSheets;
</script>

</body>
</html>
