<!DOCTYPE html>
<html>
<head>
  <title>Form Input ke Spreadsheet</title>
</head>
<body>

  <h2>Form Input Data</h2>

  <form id="dataForm">

    <label>Pilih Sheet:</label><br>
    <select name="sheetName" required>
      <option value="">-- Pilih --</option>
      <option value="Jambu">Jambu</option>
      <option value="Mawar">Mawar</option>
      <option value="Melati">Melati</option>
    </select>
    <br><br>

    <label>Nama:</label><br>
    <input type="text" name="nama" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Pesan:</label><br>
    <textarea name="pesan" required></textarea><br><br>

    <button type="submit">Kirim</button>
  </form>

  <p id="response"></p>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxpDVAl_AQXJ5LOSoLhai2KeDsyCiSGb0fMItHyR5aGVqGUgK8GIZ_TcKNt9mqGgL05/exec';
    const form = document.getElementById('dataForm');
    const responseMsg = document.getElementById('response');

    form.addEventListener('submit', e => {
      e.preventDefault();
      responseMsg.innerHTML = "Mengirim...";

      fetch(scriptURL, {
  method: 'POST',
  headers: {
    'Content-Type': 'application/x-www-form-urlencoded'
  },
  body: new URLSearchParams(new FormData(form))
})
.then(response => response.text())
.then(data => {
  responseMsg.innerHTML = data;
  form.reset();
})
.catch(error => {
  responseMsg.innerHTML = "Terjadi kesalahan!";
  console.error(error);
});
    });
  </script>

</body>
</html>
